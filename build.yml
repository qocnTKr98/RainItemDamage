name: Build Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 빌드
        run: mvn clean package -B

      - name: JAR 다운로드
        uses: actions/upload-artifact@v4
        with:
          name: RainItemDamage-1.21.4
          path: target/RainItemDamage-1.0.0.jar
          retention-days: 90
